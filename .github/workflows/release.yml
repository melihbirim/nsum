name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  benchmark-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run benchmarks
        run: ./bench_all.sh | tee notes.md
      - name: Create release with results
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file notes.md
